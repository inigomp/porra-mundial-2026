name: Sync Live Scores

on:
  schedule:
    # Every 5 minutes, all day — World Cup 2026 matches span UTC 00:00-23:59
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger score sync
        run: |
          STATUS=$(curl -s -o /tmp/body.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://porra-mundial-inigomp.vercel.app/api/cron/sync-scores")
          cat /tmp/body.json
          echo ""
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "Sync failed with status $STATUS"
            exit 1
          fi
          echo "Sync successful"
